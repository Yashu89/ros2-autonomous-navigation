slam_toolbox:
  ros__parameters:

    use_sim_time: true
    mode: mapping

    map_frame: map
    odom_frame: odom_clean
    base_frame: base_link

    scan_topic: /scan

    resolution: 0.05
    max_laser_range: 10.0

    transform_publish_period: 0.05
    transform_timeout: 0.5
    tf_buffer_duration: 60.0

    minimum_time_interval: 0.5
    throttle_scans: 2

    scan_queue_size: 20